<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Party Platformer</title>
  <link rel="stylesheet" href="css/game.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #canvas {
      display: none;
      position: fixed;
      inset: 0;
      cursor: crosshair;
    }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0d0d1a 100%);
      z-index: 100;
    }

    .panel {
      background: rgba(255,255,255,0.05);
      border: 2px solid #333;
      border-radius: 8px;
      padding: 36px 44px;
      width: 460px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
      color: #f1c40f;
      text-shadow: 0 0 20px #f1c40f88;
    }

    .subtitle {
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.72rem;
      color: #aaa;
      text-align: left;
      margin-bottom: 4px;
      margin-top: 14px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #f1c40f; }

    .team-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .team-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #555;
      border-radius: 4px;
      background: rgba(255,255,255,0.05);
      color: #aaa;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .team-btn:hover { opacity: 0.85; }
    .team-btn[data-team="green"].active { border-color: #27ae60; background: #27ae6033; color: #2ecc71; }
    .team-btn[data-team="blue"].active { border-color: #3498db; background: #3498db33; color: #82b1ff; }

    .primary-btn {
      display: block;
      width: 100%;
      margin-top: 22px;
      padding: 13px;
      background: #f1c40f;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }
    .primary-btn:hover:not(:disabled) { opacity: 0.85; }
    .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .green-btn {
      background: #2ecc71;
    }

    #lobby-waiting { display: none; }

    /* ── COMPACT MODE (waiting room) ── */
    #overlay.compact {
      inset: auto;
      top: 16px;
      right: 16px;
      left: auto;
      background: none;
      align-items: flex-start;
      justify-content: flex-end;
      pointer-events: none;
    }
    #overlay.compact .panel {
      width: 260px;
      padding: 16px 18px;
      background: rgba(10,10,26,0.88);
      border-color: #444;
      pointer-events: all;
    }
    #overlay.compact h1   { font-size: 1rem; margin-bottom: 4px; }
    #overlay.compact .subtitle { display: none; }
    #overlay.compact #connect-form { display: none !important; }
    #overlay.compact #lobby-waiting { display: block; }
    #overlay.compact .waiting-header { font-size: 0.85rem; margin-bottom: 10px; }
    #overlay.compact .primary-btn { margin-top: 12px; padding: 9px; font-size: 0.85rem; }

    .waiting-header {
      font-size: 1.1rem;
      color: #2ecc71;
      margin-bottom: 20px;
    }

    #player-list {
      list-style: none;
      text-align: left;
      margin-bottom: 12px;
      min-height: 40px;
    }
    #player-list li {
      padding: 4px 6px;
      margin-bottom: 3px;
      border-radius: 3px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-green { background: #27ae60; }
    .dot-blue { background: #3498db; }

    .host-badge {
      font-size: 0.65rem;
      background: #f1c40f;
      color: #000;
      padding: 1px 5px;
      border-radius: 2px;
    }

    #status-msg {
      font-size: 0.75rem;
      color: #888;
      min-height: 18px;
    }

    #start-btn { display: none; }

    .version-tag {
      font-size: 0.65rem;
      color: #444;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    #finish-modal {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(10,10,26,0.92);
      border: 2px solid #f1c40f;
      border-radius: 8px;
      padding: 28px 40px;
      text-align: center;
      z-index: 50;
      pointer-events: none;
    }
    #finish-title { font-size: 1.6rem; color: #f1c40f; letter-spacing: 2px; }
    #finish-subtitle { color: #aaa; font-size: 0.85rem; margin-top: 8px; }

    #host-force-end {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 50;
    }
    #force-end-btn {
      background: #e74c3c;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #force-end-btn:hover { opacity: 0.85; }

    #reconnect-banner {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 8px 16px;
      background: #c0392b;
      color: #fff;
      text-align: center;
      font-size: 0.78rem;
      font-family: 'Courier New', monospace;
      z-index: 300;
      letter-spacing: 0.5px;
    }
    #reconnect-banner.hidden { display: none; }
  </style>
</head>
<body>

<div id="overlay">
  <div class="panel">
    <h1>PARTY PLATFORMER</h1>
    <p class="subtitle">Multiplayer chaos — die, then make it harder for everyone else</p>
    <p class="version-tag">v0.1.60</p>

    <!-- Connect form -->
    <div id="connect-form">
      <label>Your name</label>
      <input type="text" id="player-name" placeholder="Player" maxlength="16" />

      <label>Room code</label>
      <input type="text" id="room-code" placeholder="my-room-123" maxlength="32" />

      <label>Server address</label>
      <input type="text" id="server-addr" value="party-game-qleq.onrender.com" />

      <label>Team</label>
      <div class="team-row">
        <button class="team-btn" data-team="green">🟢 Green Team</button>
        <button class="team-btn" data-team="blue">🔵 Blue Team</button>
      </div>

      <button class="primary-btn" id="join-btn">JOIN ROOM</button>
    </div>

    <!-- Waiting lobby -->
    <div id="lobby-waiting">
      <p class="waiting-header">Waiting in lobby…</p>
      <ul id="player-list"></ul>
      <p id="status-msg">Share the room code with friends!</p>
      <div id="host-config" style="display:none; margin-top:10px;">
        <label style="font-size:0.72rem;color:#aaa;text-align:left;display:block;margin-bottom:4px;">Rounds</label>
        <input type="number" id="rounds-count" min="1" max="20" value="6"
          style="width:100%;padding:7px 10px;background:rgba(255,255,255,0.08);border:1px solid #444;border-radius:4px;color:#fff;font-family:inherit;font-size:0.9rem;outline:none;" />
      </div>
      <button class="primary-btn green-btn" id="start-btn">▶ START GAME (host only)</button>
    </div>
  </div>
</div>

<canvas id="canvas"></canvas>
<div id="reconnect-banner" class="hidden"><span id="reconnect-msg"></span></div>

<!-- ── GAME HUD ── -->
<div id="game-hud" class="hidden">
  <div class="hud-team hud-team-green">🟢 Green <span class="hud-score" id="score-green">0</span></div>
  <div id="hud-center">
    <span id="hud-phase-label">BUILD</span>
    <span id="hud-timer">30s</span>
  </div>
  <div class="hud-team hud-team-blue"><span class="hud-score" id="score-blue">0</span> Blue 🔵</div>
</div>
<div id="hud-players" class="hidden"></div>

<!-- ── BUILD PANEL ── -->
<div id="build-panel" class="hidden">
  <div id="obstacle-grid"></div>
  <div id="build-footer">
    <button id="rotate-btn">↻ Rotate [R]</button>
    <span id="placements-counter" class="has-placements"></span>
    <span id="build-hint">Click canvas to place</span>
  </div>
</div>

<!-- ── COUNTDOWN MODAL ── -->
<div id="countdown-modal" class="hidden">
  <div id="countdown-number">3</div>
</div>

<!-- ── RESULTS PANEL ── -->
<div id="results-panel" class="hidden">
  <div id="results-title">ROUND OVER</div>
  <div id="results-scores"></div>
  <div id="results-finished"></div>
  <button id="next-round-btn">▶ Next Round</button>
  <p id="results-waiting"></p>
</div>

<!-- ── FINISH MODAL ── -->
<div id="finish-modal" class="hidden">
  <div id="finish-title">YOU FINISHED!</div>
  <p id="finish-subtitle">Waiting for others…</p>
</div>

<!-- ── HOST FORCE-END ── -->
<div id="host-force-end" class="hidden">
  <button id="force-end-btn">⏭ End Round Now</button>
</div>

<script src="js/game.js"></script>
</body>
</html>
