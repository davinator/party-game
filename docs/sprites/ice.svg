<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 30" width="128" height="30" preserveAspectRatio="none">
  <defs>
    <linearGradient id="ice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#cce8f4"/>
      <stop offset="50%"  stop-color="#96c8e0"/>
      <stop offset="100%" stop-color="#6aacc8"/>
    </linearGradient>
    <clipPath id="ic"><rect x="2" y="2" width="124" height="26"/></clipPath>
  </defs>
  <rect x="0" y="0" width="128" height="30" fill="#4888a8"/>
  <rect x="2" y="2" width="124" height="26" fill="url(#ice)"/>
  <!-- Specular gloss strip -->
  <rect x="2" y="2" width="124" height="5"
        fill="rgba(255,255,255,0.50)"/>
  <rect x="2" y="2" width="124" height="2"
        fill="rgba(255,255,255,0.70)"/>
  <!-- Frost cracks -->
  <g clip-path="url(#ic)">
    <path d="M 22,15 L 18,5 L 14,8" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/><path d="M 22,15 L 28,6" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/><path d="M 55,6 L 50,13 L 46,25" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/><path d="M 55,6 L 62,15" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/><path d="M 88,16 L 84,5 L 90,8" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/><path d="M 88,16 L 94,24" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/><path d="M 110,7 L 106,15 L 112,25" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-linecap="round"/>
  </g>
  <!-- Subtle bubble dots -->
  <circle cx="35" cy="12" r="1.2" fill="rgba(255,255,255,0.30)"/><circle cx="70" cy="8" r="1.2" fill="rgba(255,255,255,0.30)"/><circle cx="95" cy="16" r="1.2" fill="rgba(255,255,255,0.30)"/><circle cx="16" cy="20" r="1.2" fill="rgba(255,255,255,0.30)"/><circle cx="108" cy="11" r="1.2" fill="rgba(255,255,255,0.30)"/>
  <rect x="1" y="1" width="126" height="28"
        fill="none" stroke="#4888a8" stroke-width="2"/>
</svg>