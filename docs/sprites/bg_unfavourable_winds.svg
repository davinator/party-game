<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#18103A"/>
      <stop offset="22%"  stop-color="#3A1858"/>
      <stop offset="44%"  stop-color="#722858"/>
      <stop offset="62%"  stop-color="#B04030"/>
      <stop offset="76%"  stop-color="#D86028"/>
      <stop offset="88%"  stop-color="#E88838"/>
      <stop offset="100%" stop-color="#F0A840"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#dusk)"/>

  <!-- Far cloud layer -->
  <ellipse cx="215"  cy="125" rx="235" ry="80" fill="#241050"/>
  <ellipse cx="140"  cy="158" rx="175" ry="66" fill="#1E0C42"/>
  <ellipse cx="540"  cy="105" rx="268" ry="92" fill="#241050"/>
  <ellipse cx="945"  cy="90"  rx="298" ry="100" fill="#1E0C42"/>
  <ellipse cx="1348" cy="115" rx="252" ry="86" fill="#241050"/>
  <ellipse cx="1578" cy="152" rx="192" ry="74" fill="#1E0C42"/>

  <!-- Mid cloud layer -->
  <ellipse cx="325"  cy="205" rx="278" ry="74" fill="#2C1258"/>
  <ellipse cx="745"  cy="188" rx="318" ry="80" fill="#341660"/>
  <ellipse cx="1145" cy="204" rx="284" ry="76" fill="#2C1258"/>
  <ellipse cx="1540" cy="224" rx="234" ry="66" fill="#341660"/>

  <!-- Lower cloud layer -->
  <ellipse cx="175"  cy="278" rx="212" ry="56" fill="#281248"/>
  <ellipse cx="580"  cy="264" rx="258" ry="62" fill="#281248"/>
  <ellipse cx="1032" cy="280" rx="272" ry="58" fill="#281248"/>
  <ellipse cx="1480" cy="270" rx="224" ry="54" fill="#281248"/>

  <!-- Orange rim-light on cloud undersides -->
  <ellipse cx="325"  cy="252" rx="278" ry="26" fill="#C05020" opacity="0.38"/>
  <ellipse cx="745"  cy="238" rx="318" ry="22" fill="#C85018" opacity="0.32"/>
  <ellipse cx="1145" cy="254" rx="284" ry="24" fill="#C05020" opacity="0.38"/>
  <ellipse cx="175"  cy="312" rx="212" ry="18" fill="#B84018" opacity="0.28"/>
  <ellipse cx="580"  cy="300" rx="258" ry="20" fill="#B84018" opacity="0.28"/>
  <ellipse cx="1032" cy="315" rx="272" ry="18" fill="#B84018" opacity="0.28"/>

  <!-- Wind streaks (warm amber-white) -->
  <g stroke="#F4C878" stroke-linecap="round">
    <line x1="0"    y1="348" x2="382" y2="341" stroke-width="1.8" opacity="0.28"/>
    <line x1="58"   y1="370" x2="535" y2="363" stroke-width="1.2" opacity="0.2"/>
    <line x1="0"    y1="394" x2="462" y2="387" stroke-width="2.2" opacity="0.32"/>
    <line x1="202"  y1="414" x2="695" y2="407" stroke-width="1.2" opacity="0.18"/>
    <line x1="0"    y1="434" x2="362" y2="427" stroke-width="1.8" opacity="0.28"/>
    <line x1="512"  y1="354" x2="922" y2="347" stroke-width="1.4" opacity="0.22"/>
    <line x1="604"  y1="379" x2="1120" y2="372" stroke-width="2.0" opacity="0.3"/>
    <line x1="712"  y1="405" x2="1170" y2="398" stroke-width="1.2" opacity="0.18"/>
    <line x1="822"  y1="427" x2="1325" y2="420" stroke-width="1.6" opacity="0.25"/>
    <line x1="1012" y1="347" x2="1422" y2="340" stroke-width="1.4" opacity="0.22"/>
    <line x1="1118" y1="372" x2="1600" y2="365" stroke-width="2.0" opacity="0.3"/>
    <line x1="1224" y1="397" x2="1600" y2="391" stroke-width="1.2" opacity="0.18"/>
    <line x1="0"    y1="456" x2="310" y2="450" stroke-width="1.6" opacity="0.25"/>
    <line x1="100"  y1="475" x2="512" y2="469" stroke-width="1.2" opacity="0.2"/>
    <line x1="302"  y1="496" x2="768" y2="490" stroke-width="2.0" opacity="0.3"/>
    <line x1="618"  y1="449" x2="1072" y2="443" stroke-width="1.4" opacity="0.22"/>
    <line x1="924"  y1="469" x2="1372" y2="463" stroke-width="1.6" opacity="0.25"/>
    <line x1="1218" y1="444" x2="1600" y2="438" stroke-width="1.2" opacity="0.18"/>
  </g>

  <!-- Horizon glow -->
  <rect x="0" y="755" width="1600" height="35" fill="#E07830" opacity="0.28"/>

  <!-- Ground silhouette -->
  <rect x="0" y="870" width="1600" height="30" fill="#1A0C30"/>
  <rect x="0" y="858" width="1600" height="14" fill="#22103A"/>
</svg>
